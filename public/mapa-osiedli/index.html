<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Głogów — ulice i osiedla</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --forest-950:#0c1f15; --forest-900:#11291c; --forest-800:#173626;
    --forest-600:#2f5a41; --gold-500:#c9a227; --gold-400:#d8b94b;
    --cream:#f3efe3; --cream-dim:#bfc7bd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--forest-950),var(--forest-900));
    color:var(--cream); padding:18px; min-height:100%;
  }
  h1{font-size:22px;margin:0 0 2px;letter-spacing:.3px}
  h1 span{color:var(--gold-400)}
  .sub{color:var(--cream-dim);font-size:13px;margin:0 0 16px}
  .wrap{max-width:1180px;margin:0 auto}
  .back{
    display:inline-flex;align-items:center;gap:7px;margin:0 0 14px;
    padding:8px 14px;border-radius:999px;text-decoration:none;
    background:var(--forest-800);border:1px solid rgba(201,162,39,.25);
    color:var(--gold-400);font-size:13px;font-weight:600;
    transition:border-color .15s,background .15s
  }
  .back:hover{border-color:var(--gold-500);background:var(--forest-600)}
  .back span{font-size:16px;line-height:1}
  .grid{display:grid;gap:16px;grid-template-columns:1fr 1fr}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{
    background:var(--forest-800);border:1px solid rgba(201,162,39,.18);
    border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)
  }
  .card h2{font-size:14px;margin:0 0 10px;color:var(--gold-400);text-transform:uppercase;letter-spacing:1px}
  label{display:block;font-size:12px;color:var(--cream-dim);margin:0 0 6px}
  input,select{
    width:100%;padding:11px 12px;border-radius:10px;font-size:15px;
    background:var(--forest-950);color:var(--cream);
    border:1px solid var(--forest-600);outline:none
  }
  input:focus,select:focus{border-color:var(--gold-500);box-shadow:0 0 0 3px rgba(201,162,39,.18)}
  .answer{
    margin-top:12px;padding:14px;border-radius:12px;min-height:54px;
    background:var(--forest-950);border:1px dashed rgba(201,162,39,.35);font-size:15px
  }
  .answer .big{font-size:20px;font-weight:700}
  .answer .os{color:var(--gold-400);font-weight:700}
  .pill{
    display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;
    font-weight:700;color:#0c1f15
  }
  .sugg{margin-top:8px;max-height:230px;overflow:auto;border-radius:10px}
  .sugg button{
    display:flex;justify-content:space-between;gap:10px;width:100%;text-align:left;
    padding:9px 12px;background:transparent;color:var(--cream);border:0;
    border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:14px
  }
  .sugg button:hover{background:rgba(201,162,39,.10)}
  .sugg .mini{color:var(--cream-dim);font-size:12px;white-space:nowrap}
  .streets{margin-top:10px;max-height:330px;overflow:auto;
    columns:2;column-gap:18px}
  @media(max-width:520px){.streets{columns:1}}
  .streets div{break-inside:avoid;padding:4px 2px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.05)}
  .count{color:var(--cream-dim);font-size:13px;margin:2px 0 0}
  #map{height:460px;border-radius:14px;overflow:hidden;border:1px solid var(--forest-600)}
  .mapfail{display:flex;align-items:center;justify-content:center;height:100%;color:var(--cream-dim);font-size:14px;text-align:center;padding:20px}
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .legend button{display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.1);
    background:var(--forest-950);color:var(--cream);border-radius:999px;padding:4px 10px;font-size:12px;cursor:pointer}
  .legend button:hover{border-color:var(--gold-500)}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .foot{color:var(--cream-dim);font-size:12px;text-align:center;margin-top:14px}
  .leaflet-tooltip{font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../dla-klienta/"><span>←</span> Wróć do: Dla klienta</a>
  <h1>Głogów — <span>ulice i osiedla</span></h1>
  <p class="sub">Wpisz ulicę, żeby zobaczyć osiedle — albo wybierz osiedle, żeby zobaczyć jego ulice. Dane: OpenStreetMap.</p>

  <div class="grid">
    <div class="card">
      <h2>Ulica → osiedle</h2>
      <label for="street">Wpisz nazwę ulicy</label>
      <input id="street" placeholder="np. Merkurego, Wolności, Sienkiewicza…" autocomplete="off">
      <div class="answer" id="answer">Zacznij pisać nazwę ulicy…</div>
      <div class="sugg" id="sugg"></div>
    </div>

    <div class="card">
      <h2>Osiedle → ulice</h2>
      <label for="osiedle">Wybierz osiedle</label>
      <select id="osiedle"><option value="">— wybierz —</option></select>
      <p class="count" id="count"></p>
      <div class="streets" id="streets"></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Mapa osiedli</h2>
    <div id="map"></div>
    <div class="legend" id="legend"></div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function norm(s){
  return (s||"").toLowerCase().trim()
    .replace(/ł/g,"l")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();
}

const collator = new Intl.Collator('pl');
const ULICE = DANE.ulice.slice().sort((a,b)=>collator.compare(a.ulica,b.ulica));
const OSIEDLA = DANE.osiedla.slice().sort(collator.compare);
const byOsiedle = {};
ULICE.forEach(u=>{ (byOsiedle[u.osiedle] = byOsiedle[u.osiedle] || []).push(u.ulica); });

const PALETTE = ["#2f7d4f","#c9a227","#3a6ea5","#b5651d","#8e44ad","#16a085",
  "#c0392b","#27ae60","#d35400","#2980b9","#7f8c8d","#af7ac5","#1abc9c",
  "#e67e22","#34495e","#e74c3c","#9b59b6","#2ecc71","#f39c12"];
const colorOf = {};
const allNames = Array.from(new Set(
  OSIEDLA.concat(DANE.geojson.features.map(f=>f.properties.name))
)).sort(collator.compare);
allNames.forEach((o,i)=> colorOf[o]=PALETTE[i%PALETTE.length]);

// ---- elementy
const $street=document.getElementById('street');
const $answer=document.getElementById('answer');
const $sugg=document.getElementById('sugg');
const $osiedle=document.getElementById('osiedle');
const $count=document.getElementById('count');
const $streets=document.getElementById('streets');
const $legend=document.getElementById('legend');
const $foot=document.getElementById('foot');

$foot.textContent = `${ULICE.length} ulic · ${OSIEDLA.length} osiedli · wygenerowano ${DANE._meta.generated}`;

// dropdown osiedli
OSIEDLA.forEach(o=>{
  const opt=document.createElement('option'); opt.value=o; opt.textContent=`${o} (${(byOsiedle[o]||[]).length})`;
  $osiedle.appendChild(opt);
});

// ---- wyszukiwanie ulicy
function showAnswer(u){
  const c=colorOf[u.osiedle]||'#888';
  $answer.innerHTML = `<div class="big">${u.ulica}</div>
    <div style="margin-top:6px">osiedle: <span class="pill" style="background:${c}">${u.osiedle}</span></div>
    <div id="streetStatus" style="margin-top:8px;font-size:13px;color:var(--cream-dim)"></div>`;
  setOsiedle(u.osiedle,false);
  highlight(u.osiedle);
  showStreet(u.ulica);
}
function renderSugg(q){
  const nq=norm(q);
  $sugg.innerHTML='';
  if(!nq){ $answer.textContent='Zacznij pisać nazwę ulicy…'; return; }
  const exact = ULICE.filter(u=>norm(u.ulica)===nq);
  const starts = ULICE.filter(u=>norm(u.ulica).startsWith(nq) && norm(u.ulica)!==nq);
  const incl = ULICE.filter(u=>norm(u.ulica).includes(nq) && !norm(u.ulica).startsWith(nq));
  const list = exact.concat(starts, incl).slice(0,40);
  if(exact.length){ showAnswer(exact[0]); }
  else if(list.length){ $answer.innerHTML = `Wybierz z listy poniżej — pasuje <b>${list.length}</b> ulic.`; }
  else { $answer.innerHTML = `Brak ulicy „<b>${q}</b>" w danych Głogowa.`; }
  list.forEach(u=>{
    const b=document.createElement('button');
    const c=colorOf[u.osiedle]||'#888';
    b.innerHTML=`<span>${u.ulica}</span><span class="mini"><span class="pill" style="background:${c}">${u.osiedle}</span></span>`;
    b.onclick=()=>{ $street.value=u.ulica; $sugg.innerHTML=''; showAnswer(u); };
    $sugg.appendChild(b);
  });
}
$street.addEventListener('input', e=>renderSugg(e.target.value));
$street.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const b=$sugg.querySelector('button'); if(b) b.click(); }
});

// ---- osiedle -> ulice
function setOsiedle(name, focusMap){
  $osiedle.value=name;
  if(focusMap) clearStreet();
  const list=(byOsiedle[name]||[]).slice().sort(collator.compare);
  $count.textContent = name ? `${list.length} ulic na osiedlu ${name}` : '';
  $streets.innerHTML='';
  list.forEach(u=>{ const d=document.createElement('div'); d.textContent=u; $streets.appendChild(d); });
  if(focusMap) highlight(name);
}
$osiedle.addEventListener('change', e=> setOsiedle(e.target.value, true));

let map=null, geoLayer=null, streetLayer=null;
// Serwery Overpass (geometria ulicy z OpenStreetMap). Dwa, dla niezawodności.
const OVERPASS_EP=[
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
];
const streetCache={};        // pobrane przebiegi ulic (cache w sesji)
let streetSeq=0;             // numer żądania — ignoruje spóźnione odpowiedzi
function clearStreet(){ if(streetLayer && map){ map.removeLayer(streetLayer); } streetLayer=null; }
function setStreetStatus(seq,msg){ if(seq!==streetSeq) return; const el=document.getElementById('streetStatus'); if(el) el.textContent=msg; }
async function fetchStreetGeom(name){
  const key=norm(name);
  if(streetCache[key]) return streetCache[key];
  const safe=name.replace(/"/g,' ');
  const q=`[out:json][timeout:25];area["name"="Głogów"]["boundary"="administrative"]["admin_level"="7"]->.g;way["highway"]["name"="${safe}"](area.g);out geom;`;
  for(const ep of OVERPASS_EP){
    try{
      const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),12000);
      const r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q),signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok) continue;                 // serwer zajęty → spróbuj kolejnego
      const j=await r.json();
      const lines=(j.elements||[]).filter(e=>e.geometry&&e.geometry.length>=2)
        .map(e=>e.geometry.map(p=>[p.lat,p.lon]));
      return lines.length ? (streetCache[key]=lines) : null; // OK: zwróć przebieg albo brak
    }catch(e){ /* błąd sieci → spróbuj kolejnego serwera */ }
  }
  return null;
}
async function showStreet(name){
  if(!map) return;                        // offline / brak mapy → zostaje sama wyszukiwarka
  clearStreet();
  const seq=++streetSeq;
  setStreetStatus(seq,'Rysuję przebieg ulicy na mapie…');
  let lines=null;
  try{ lines=await fetchStreetGeom(name); }catch(e){ lines=null; }
  if(seq!==streetSeq) return;             // w międzyczasie wybrano inną ulicę
  if(!lines){ setStreetStatus(seq,'Nie udało się wczytać przebiegu ulicy — osiedle pozostaje zaznaczone.'); return; }
  streetLayer=L.featureGroup();
  lines.forEach(latlngs=>{
    L.polyline(latlngs,{color:'#0c1f15',weight:8,opacity:0.55,lineCap:'round',lineJoin:'round'}).addTo(streetLayer);
    L.polyline(latlngs,{color:'#d8b94b',weight:4,opacity:0.95,lineCap:'round',lineJoin:'round'}).addTo(streetLayer);
  });
  streetLayer.addTo(map);
  try{ streetLayer.bindTooltip(name,{sticky:true,direction:'top'}); }catch(e){}
  try{ map.fitBounds(streetLayer.getBounds(),{padding:[40,40],maxZoom:17}); }catch(e){}
  setStreetStatus(seq,'Przebieg ulicy zaznaczony na mapie (złota linia).');
}
function highlight(name){
  if(!geoLayer) return;
  let target=null;
  geoLayer.eachLayer(l=>{
    const it=l.feature.properties.name===name;
    l.setStyle({weight:it?3:1, color:it?'#d8b94b':'#0c1f15', fillOpacity:it?0.6:0.2});
    if(it){ target=l; l.bringToFront(); }
  });
  if(target){ try{ map.fitBounds(target.getBounds(),{padding:[24,24]}); }catch(e){} }
}
function initMap(){
  const el=document.getElementById('map');
  if(typeof L==='undefined'){ el.innerHTML='<div class="mapfail">Mapa wymaga połączenia z internetem.<br>Wyszukiwarka ulic i osiedli działa też bez internetu.</div>'; return; }
  map=L.map('map',{scrollWheelZoom:true}).setView([51.66,16.085],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  geoLayer=L.geoJSON(DANE.geojson,{
    style:f=>({color:'#0c1f15',weight:1,fillColor:colorOf[f.properties.name]||'#888',fillOpacity:0.35}),
    onEachFeature:(f,layer)=>{
      layer.bindTooltip(f.properties.name,{sticky:true});
      layer.on('click',()=> setOsiedle(f.properties.name,true));
    }
  }).addTo(map);
  try{ map.fitBounds(geoLayer.getBounds()); }catch(e){}
}

// legenda
allNames.forEach(o=>{
  const b=document.createElement('button');
  b.innerHTML=`<i style="background:${colorOf[o]}"></i>${o}`;
  b.onclick=()=> setOsiedle(o,true);
  $legend.appendChild(b);
});

initMap();
</script>
